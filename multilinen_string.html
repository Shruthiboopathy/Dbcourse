<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multilinen string</title>
  </head>

  <body>
    <script>
      /* Array COPYING */

      let orgi = ["alpha", "beta"];
      let dub = orgi;
      console.log(orgi);
      console.log(dub);
      dub.push("78");

      console.log(orgi);
      console.log(dub);

      let dub1 = [...orgi]; /// let dub1=[...orgi]

      dub1.push("96");
      console.log(dub);
      console.log(orgi);
      console.log(dub1);

      orgi.push("hello");
      console.log(orgi);
      console.log(dub1);

      /* OBJECT COPYING */

      let obj1 = { roll: 45 };
      let obj2 = { ...obj1 };
      console.log(obj1);
      obj2.roll = 56;
      console.log(obj2);

      /* Array  MERGING */
      let array2 = ["raj", "kannan"];
      let array3 = [...array2, ...orgi, ...array2];
      console.log(array3);

      /* OBJECT MERGING  */

      let obj3 = { age: 23 };
      let obj4 = { ...obj1, ...obj3, ...obj2, ...obj1 };
      console.log(obj4);

      var minn = Math.max(10, 9, 8, 1, 0);
      console.log(minn);

      let arr1 = [10, 9, 8, 1, 0];

      let minim = Math.min(...arr1); //
      console.log(minim);

      /* spread in destuctring */
      let d_arr = [45, 56, 78, 90, 989];
      let [a, b, ...c] = d_arr;
      console.log(a);
      console.log(b);
      console.log(c);
      //console.log(d)
      let de_obj = {
        deroll: 45,
        age: 23,
        fname: "raj",
        state: "tn",
        code: 600053,
      };
      let { deroll, age, ...fn } = de_obj;
      console.log(deroll);
      console.log(age);
      console.log(fn);
      //console.log(state)

      function added(...a) {
        //rest parameter
        console.log(a);
        var b = 0;
        for (let i of a) {
          b += i;
        }
        return console.log(b);
      }
      added(1, 2, 3);
      added(1, 2, 3, 4, 5, 6);
    </script>
  </body>
</html>
