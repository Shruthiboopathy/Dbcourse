<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      /*arithmetic operators*/
      var a = 45;
      var b = 5;
      console.log(a + b);
      console.log(a - b);
      console.log(a * b);
      console.log(a / b);
      console.log(a % b);

      //assignment operations//
      var a = 5;
      var b = 2;
      a += 6; //a=a+6 add and assign
      console.log(a);
      console.log(a + b);

      var d = 5;
      d += 6; //d=d+6 add and assign
      console.log(d);

      d -= 3; //d=d-3  and assign
      console.log(a - d);

      d *= 6; //d=d*6  and assign
      console.log(a * d);

      d /= 6; //d=d/6  and assign
      console.log(a / d);

      d %= 6; //d=d%6  and assign
      console.log(a % d);

      //Comparison operators//

      var a = 45;
      var b = 5;

      if (a == b) {
        //a==b  a>=b  a<=b  a>b  a<b//
        console.log("equal");
      } else {
        console.log("not equal");
      }

      //Logical operators//

      var a = 6;
      var b = 3;
      if (a === b || a < b) {
        console.log("OR");
      }

      if (a === b && a == b) {
        console.log("AND");
      }
      if (!(a < b)) {
        console.log("not");
      }

      //increment operqtor//
      a = 47;
      a++;
      console.log(a);

      //decrement operator//
      a--;
      console.log(a);

      //exponent operator//

      console.log(a ** 2);
    </script>
  </body>
</html>
