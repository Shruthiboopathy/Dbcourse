    <script>
      
/*HTML INLINE EVENT (onclick inside HTML)*/

// Example HTML:
// <button onclick="inlineClick()">Inline Click</button>

function inlineClick() {
  console.log("Inline Event Triggered");
}


/*
  DOM PROPERTY EVENT (element.onclick)
*/
const btn1 = document.createElement("button");
btn1.textContent = "DOM Property Click";
document.body.appendChild(btn1);

btn1.onclick = function () {
  console.log("DOM Property Event Triggered");
};


/*
   addEventListener() METHOD
*/
const btn2 = document.createElement("button");
btn2.textContent = "addEventListener Click";
document.body.appendChild(btn2);

function handleClick() {
  console.log("addEventListener Triggered");
}

btn2.addEventListener("click", handleClick);


/*
  removeEventListener()
*/
const btn3 = document.createElement("button");
btn3.textContent = "Remove Event Listener";
document.body.appendChild(btn3);

function removableEvent() {
  console.log("This will run only once");
}

btn3.addEventListener("click", removableEvent);

setTimeout(() => {
  btn3.removeEventListener("click", removableEvent);
  console.log("Event Listener Removed after 5 seconds");
}, 5000);


/*
 EVENT OBJECT
*/
document.addEventListener("click", function (event) {
  console.log("Event Type:", event.type);
  console.log("Target Element:", event.target);
});

/*
  KEYBOARD EVENTS
*/
document.addEventListener("keydown", function (e) {
  console.log("Key Pressed:", e.key);
});


/*
  MOUSE EVENTS
  */
document.addEventListener("dblclick", function () {
  console.log("Double Clicked");
});

document.addEventListener("mouseover", function () {
  console.log("Mouse Over");
});


/*
  FORM EVENTS
*/
const form = document.createElement("form");
const input = document.createElement("input");
input.placeholder = "Type something";

form.appendChild(input);
document.body.appendChild(form);

input.addEventListener("focus", () => console.log("Input Focused"));
input.addEventListener("blur", () => console.log("Input Blurred"));

form.addEventListener("submit", function (e) {
  e.preventDefault();
  console.log("Form Submitted");
});


/*
  INPUT EVENT
*/
input.addEventListener("input", function (e) {
  console.log("Input Value:", e.target.value);
});


/*
  LOAD EVENT
*/
window.addEventListener("load", function () {
  console.log("Page Fully Loaded");
});


/*
  RESIZE EVENT
*/
window.addEventListener("resize", function () {
  console.log("Window Resized");
});


/*
  CUSTOM EVENTS
*/
const customEvent = new Event("myCustomEvent");

document.addEventListener("myCustomEvent", function () {
  console.log("Custom Event Triggered");
});

document.dispatchEvent(customEvent);
