<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .outer_layer{
            width: 500px;
            height:400px;
            border: 3px solid red;
            background-color: #d8e9f3;
        }
        
        .ball_holder{
            height: 76px;
            width: 75px;
            background-image: url("cricket-ball-pattern-background.webp"); 
            animation-name: ball_bounce;
            animation-duration: 1s;
            animation-iteration-count: infinite;

        }
         @keyframes ball_bounce{
            0%{background-image: url("cricket-ball-pattern-background.webp"); ;position:relative;top:100px; left:0px}
            25%{background-image: url("cricket-ball-pattern-background.webp"); ;position:relative;top:230px; left:100px}
            50%{background-image: url("cricket-ball-pattern-background.webp"); ;position:relative;top:260; left:230px}
            75%{background-image: url("cricket-ball-pattern-background.webp"); ;position:relative;left:100px}
            100%{background-image: url("cricket-ball-pattern-background.webp"); ;position:relative;left:200px}
             } 
    </style>
</head>
<body>
   
       <div class="outer_layer">
        <div class="ball_holder">

        </div>
    </div>
    
</body>
</html>
