      /* grid value*/
      .container {
        display: grid;
        grid-template-columns: 200px 300px 1fr;
        grid-gap: 20px;
        grid-template-rows: 1fr 2fr;
        grid-column-gap: 30px;
        grid-row-gap: 20px;
      }
      .first_item {
        grid-row-start: 1;
        grid-row-end: 3;
      }
      .second_item {
        grid-column-start: 2;
        grid-column-end: 4;
      }
    </style>
