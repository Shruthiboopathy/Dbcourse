<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tagged</title>
  </head>
  <body>
    <script>
      /* ==============================
   1️⃣ Template Literal
================================= */

      let firstName = "Rajan";
      let lastName = "Kumar";

      function sum(x, y) {
        return x + y;
      }

      let message = `Welcome ${firstName} ${lastName}
Sum is ${sum(10, 20)}`;

      console.log(message);

      /* ==============================
   2️⃣ Tagged Template Literal
================================= */

      let user = "RAJ";
      let city = "Chennai";

      function customTag(strings, ...values) {
        console.log("Strings:", strings);
        console.log("Values:", values);
      }

      customTag`Hello ${user} welcome to ${city}`;

      /* ==============================
   3️⃣ String.raw()
================================= */

      console.log(`Line1 \n Line2`);
      console.log(String.raw`Line1 \n Line2`);
    </script>
  </body>
</html>
