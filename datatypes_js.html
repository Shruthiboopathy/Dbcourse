<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      //Primitive datatypes//
      /* string*/
      var firstname = "Rajan";
      var lastname = "Sabari'N'";
      var multi_line_string = `welcome 
        to 
        javascript`;
      var age = "45.00";

      console.log(firstname);
      console.log(lastname);
      console.log(multi_line_string);
      console.log(age);

      /* number*/
      var age = 45;
      const pi = 3.14;
      document.write(age);
      document.write("<br>");
      document.write(pi);
      document.write("<br>");

      /* booloean*/
      var pass = true;
      var fail = false;
      document.write(pass);
      document.write("<br>");
      document.write(fail);

      /*undefined*/
      var a;
      console.log(a);

      /*null*/
      var b = null;
      console.log(b);

      /*array*/
      const array1 = [45, true, "rajan"];
      console.log(array1);

      /* object*/
      const obj_name = {
        candidate_ID: "CN_2026",
        student_name: "Shruthi",
        subject: "Database",
      };
      console.log(obj_name);
    </script>
  </head>
  <body></body>
</html>
